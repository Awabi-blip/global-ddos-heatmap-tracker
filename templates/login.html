{% extends "layout.html" %}

{% block main %}

<style>
    /* 1. Centering Container */
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh; /* Takes up most of the screen height */
        padding: 1rem;
    }

    /* 2. The Glass Card */
    .glass-card {
        background: rgba(255, 255, 255, 0.03); /* Extremely subtle fill */
        backdrop-filter: blur(20px);           /* Strong blur for that "premium" look */
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1); /* Thin crisp border */
        border-radius: 2rem;                   /* Rounded corners */
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); /* Deep shadow for depth */
        padding: 4rem 3rem;
        width: 100%;
        max-width: 450px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        animation: floatIn 0.8s ease-out;
    }

    /* 3. The Google Button (High Contrast) */
    .google-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background-color: white; /* White stands out on dark glass */
        color: #1a1a1a;
        font-weight: 700;
        font-size: 1rem;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 50px; /* Pill shape */
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: none;
        cursor: pointer;
    }

    .google-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15); /* White glow on hover */
        text-decoration: none;
        color: #1a1a1a;
    }

    .google-btn:active {
        transform: translateY(0);
    }

    /* 4. Text Styling */
    .glass-card h1 {
        margin: 0;
        font-size: 2rem;
        background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    .glass-card p {
        color: #888;
        font-size: 0.9rem;
        margin: 0;
    }

    /* Animation */
    @keyframes floatIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="login-wrapper">
    <article class="glass-card">
        <div>
            <h1>Welcome Back</h1>
            <p>Access the secure heatmap terminal</p>
        </div>

        <!-- The Google Button -->
        <form action="/login" method="post">
            <button type="submit" class="google-btn" style="display: inline-flex; align-items: center; gap: 12px; background: white; color: #1a1a1a; padding: 12px 24px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer;">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" width="24" height="24">
                Sign in with Google
            </button>
        </form>
    </article>
</div>

{% endblock %}
