{% extends "layout.html" %}
{% block main %}

<script id="attackData" type="application/json">{{ data | safe }}</script>
<script id="countryData" type="application/json">{{ data_countries | safe }}</script>

<!-- Side panel -->
<div id="countryPanel" style="
    position: fixed;
    right: 30px;
    top: 120px;
    width: 350px;
    background: rgba(0, 0, 0, 0.95);
    border: 2px solid #00ff00;
    border-radius: 12px;
    padding: 25px;
    display: none;
    z-index: 1000;
    box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
">
    <h3 style="margin: 0 0 20px 0; color: #00ff00; font-size: 24px; border-bottom: 1px solid #00ff00; padding-bottom: 10px;" id="countryName">Select a country</h3>
    <div style="padding-top: 15px;">
        <p style="color: #ff4d4d; font-size: 48px; font-weight: bold; margin: 15px 0;" id="attackCount">0</p>
        <p style="color: #aaa; font-size: 16px; margin: 0;">Total Attacks Originated</p>
    </div>
    <button onclick="document.getElementById('countryPanel').style.display='none'" style="
        margin-top: 25px;
        width: 100%;
        padding: 12px;
        background: #1a1a2e;
        border: 1px solid #00ff00;
        color: #00ff00;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    " onmouseover="this.style.background='#00ff00'; this.style.color='#000'" onmouseout="this.style.background='#1a1a2e'; this.style.color='#00ff00'">Close</button>
</div>

<div id="globeViz" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    background: #000;
"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
// Parse attack locations (individual points)
const attackLocations = JSON.parse(document.getElementById('attackData').textContent.trim());
console.log("Attack locations loaded:", attackLocations.length, "points");

// Parse country stats (aggregated counts)
const countryStats = JSON.parse(document.getElementById('countryData').textContent.trim());
console.log("Country stats loaded:", countryStats.length, "countries");

// Convert to lookup for fast access
const attacksByCountry = {};
countryStats.forEach(stat => {
    attacksByCountry[stat.country_code] = stat.attack_count;
});

const maxAttacks = Math.max(...Object.values(attacksByCountry), 1);

// Fetch country GeoJSON
fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
    .then(res => res.json())
    .then(countries => {
        console.log("Countries loaded:", countries.features.length);
        
        const world = Globe()
            (document.getElementById('globeViz'))
            .backgroundColor('#000000')
            .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')  // Starfield background            .showAtmosphere(true)
            .atmosphereColor('#4a90e2')
            .atmosphereAltitude(0.25)
            
            // LAYER 1: Hexed country polygons (heatmap)
            .hexPolygonsData(countries.features)
            .hexPolygonResolution(4)
            .hexPolygonMargin(0.5)
            .hexPolygonColor(feat => {
                const countryCode = feat.properties.ISO_A2;
                const attacks = attacksByCountry[countryCode] || 0;
                
                if (attacks === 0) return '#1a1a2e';
                
                const intensity = attacks / maxAttacks;
                if (intensity > 0.7) return '#ff0000';
                if (intensity > 0.4) return '#ff8c00';
                if (intensity > 0.2) return '#ffff00';
                return '#00ff00';
            })
            .hexPolygonAltitude(feat => {
                const countryCode = feat.properties.ISO_A2;
                const attacks = attacksByCountry[countryCode] || 0;
                return attacks > 0 ? 0.01 + (attacks / maxAttacks) * 0.12 : 0.005;
            })
            .hexPolygonLabel(feat => {
                const countryCode = feat.properties.ISO_A2;
                const countryName = feat.properties.NAME;
                const attacks = attacksByCountry[countryCode] || 0;
                return `
                    <div style="background: rgba(0,0,0,0.95); padding: 15px; border: 2px solid #00ff00; border-radius: 10px;">
                        <b style="color: #00ff00; font-size: 18px;">${countryName}</b><br/>
                        <span style="color: #ff4d4d; font-size: 24px; font-weight: bold;">${attacks.toLocaleString()}</span>
                        <span style="color: #aaa; font-size: 14px;"> attacks</span>
                    </div>
                `;
            })
            .onHexPolygonClick(feat => {
                const countryCode = feat.properties.ISO_A2;
                const countryName = feat.properties.NAME;
                const attacks = attacksByCountry[countryCode] || 0;
                
                document.getElementById('countryName').textContent = countryName;
                document.getElementById('attackCount').textContent = attacks.toLocaleString();
                document.getElementById('countryPanel').style.display = 'block';
                
                world.controls().autoRotate = false;
            })
            
            // LAYER 2: Individual attack points (exact locations)
            .pointsData(attackLocations)
            .pointLat('latitude')
            .pointLng('longitude')
            .pointColor(() => '#00ffff')  // Cyan points
            .pointAltitude(0.1)  // Slight elevation above surface
            .pointRadius(0.35)  // Small glowing dots
            .pointLabel(d => `
                <div style="background: rgba(0,0,0,0.95); padding: 10px; border: 2px solid #00ffff; border-radius: 8px;">
                    <b style="color: #00ffff; font-size: 14px;">Attack Location</b><br/>
                    <span style="color: #fff; font-size: 12px;">IP: ${d.ip_address}</span><br/>
                    <span style="color: #aaa; font-size: 11px;">Lat: ${d.latitude.toFixed(4)}, Lng: ${d.longitude.toFixed(4)}</span>
                </div>
            `);

        // Controls
        world.controls().enableRotate = true;
        world.controls().enableZoom = true;
        world.controls().enablePan = false;
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.3;
        world.controls().minDistance = 180;
        world.controls().maxDistance = 600;
        
        world.pointOfView({ altitude: 1.8 });
        function animate() {
            world.controls().update();  // Required for damping
            requestAnimationFrame(animate);
        }
        animate();
        // Resume auto-rotate after interaction
        let interactionTimeout;
        document.getElementById('globeViz').addEventListener('mousedown', () => {
            world.controls().autoRotate = false;
            clearTimeout(interactionTimeout);
        });
        
        document.getElementById('globeViz').addEventListener('mouseup', () => {
            interactionTimeout = setTimeout(() => {
                if (document.getElementById('countryPanel').style.display === 'none') {
                    world.controls().autoRotate = true;
                }
            }, 2000);
        });
        
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        });
        
        console.log("Globe ready! Heatmap + individual points loaded! 🔥");
    });
</script>

<style>
/* Remove main padding for full-screen globe */
main {
    padding: 0 !important;
    margin: 0 !important;
}

/* Ensure body has no gaps */
body {
    margin: 0;
    padding: 0;
}
header {
    background: rgba(0, 0, 0, 0.95) !important;
    position: relative;
    z-index: 0;
    box-shadow: 0 2px 10px rgba(0, 255, 0, 0.1);
}

footer {
    background: rgba(0, 0, 0, 0.95) !important;
    position: relative;
    z-index: 0;
    box-shadow: 0 -2px 10px rgba(0, 255, 0, 0.1);
}

#globeViz canvas {
    outline: none;
    cursor: grab;
}

#globeViz canvas:active {
    cursor: grabbing;
}
</style>

{% endblock %}
